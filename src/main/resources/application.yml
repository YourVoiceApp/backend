# 배포(JAR/Docker) 시에는 application-local.yml 을 넣지 않으므로 이 파일만 적용됩니다.
# 로컬: spring.profiles.default=local + application-local.yml 이 아래 설정을 덮어씁니다.

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 배포/ Docker: 테이블 자동 생성·변경. create-drop 은 종료 시 스키마 삭제·빈 DB에서 드롭 단계 에러가 잦음.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false

  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

server:
  port: 9090

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

auth:
  email-verification:
    expiration-seconds: ${EMAIL_VERIFICATION_EXPIRATION_SECONDS:300}
    from-address: ${EMAIL_VERIFICATION_FROM_ADDRESS:${SPRING_MAIL_USERNAME:no-reply@yourvoiceback.local}}
  google:
    client-id: ${GOOGLE_CLIENT_ID:498950596222-tncs8b6ce662tiuga816ai9pda03e3fr.apps.googleusercontent.com}
  jwt:
    secret: ${JWT_SECRET_BASE64:ZGV2LXNlY3JldC1rZXktZm9yLWp3dC1zaG91bGQtYmUtbG9uZy1lbm91Z2gtMTIzNDU2}
    access-expiration-seconds: 1800
    refresh-expiration-seconds: 1209600

supertone:
  api:
    base-url: ${SUPERTONE_API_BASE_URL:https://supertoneapi.com}
    key: ${SUPERTONE_API_KEY:}

app:
  # 로컬은 application-local.yml 에서 true. 배포 서버에서 테스트 가입이 필요하면 APP_TEST_AUTH_ENABLED=true
  test-auth:
    enabled: ${APP_TEST_AUTH_ENABLED:true}
  generated-audio:
    storage-path: ${APP_GENERATED_AUDIO_STORAGE_PATH:storage/generated-audios}
  voice-source:
    storage-path: ${APP_VOICE_SOURCE_STORAGE_PATH:storage/voice-sources}
  audio-storage:
    mode: ${APP_AUDIO_STORAGE_MODE:local}
    s3:
      bucket: ${APP_AUDIO_STORAGE_S3_BUCKET:}
      region: ${APP_AUDIO_STORAGE_S3_REGION:ap-northeast-2}
      generated-prefix: ${APP_AUDIO_STORAGE_S3_GENERATED_PREFIX:voices/generated}
      source-prefix: ${APP_AUDIO_STORAGE_S3_SOURCE_PREFIX:voices/source}
