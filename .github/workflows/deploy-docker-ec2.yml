name: Build, push Docker Hub, deploy EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/your_voice_back:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/your_voice_back:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          port: 22
          script_stop: true
          script: |
            set -e
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/your_voice_back:${{ github.sha }}"
            NAME="your-voice-back"
            docker pull "$IMAGE"
            docker stop "$NAME" 2>/dev/null || true
            docker rm "$NAME" 2>/dev/null || true
            docker run -d \
              --name "$NAME" \
              --restart unless-stopped \
              -p 9090:9090 \
              -e SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
              -e SPRING_MAIL_HOST="${{ secrets.SPRING_MAIL_HOST }}" \
              -e SPRING_MAIL_PORT="${{ secrets.SPRING_MAIL_PORT }}" \
              -e SPRING_MAIL_USERNAME="${{ secrets.SPRING_MAIL_USERNAME }}" \
              -e SPRING_MAIL_PASSWORD="${{ secrets.SPRING_MAIL_PASSWORD }}" \
              -e SPRING_MAIL_SMTP_AUTH="${{ secrets.SPRING_MAIL_SMTP_AUTH }}" \
              -e SPRING_MAIL_SMTP_STARTTLS_ENABLE="${{ secrets.SPRING_MAIL_SMTP_STARTTLS_ENABLE }}" \
              -e EMAIL_VERIFICATION_FROM_ADDRESS="${{ secrets.EMAIL_VERIFICATION_FROM_ADDRESS }}" \
              -e EMAIL_VERIFICATION_EXPIRATION_SECONDS="${{ secrets.EMAIL_VERIFICATION_EXPIRATION_SECONDS }}" \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e JWT_SECRET_BASE64="${{ secrets.JWT_SECRET_BASE64 }}" \
              "$IMAGE"
            docker image prune -f
